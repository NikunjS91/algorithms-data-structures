name: Update README Stats

on:
  push:
    branches:
      - main
    paths:
      - 'Arrays/**'
      - 'Strings/**'
      - 'LinkedLists/**'
      - 'Trees/**'
      - 'Graphs/**'
      - 'DynamicProgramming/**'
      - 'Sorting/**'
  workflow_dispatch:  # Allows manual trigger

jobs:
  update-readme:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for accurate date tracking
      
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: 📊 Update README Stats
        run: |
          echo "🔍 Scanning for problem files..."
          node scripts/update-readme.js
      
      - name: 📝 Check for Changes
        id: verify
        run: |
          git diff --quiet README.md || echo "changed=true" >> $GITHUB_OUTPUT
      
      - name: 💾 Commit Changes
        if: steps.verify.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "📊 Auto-update README stats [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: ✅ Summary
        run: |
          echo "### 🎉 README Updated Successfully!" >> $GITHUB_STEP_SUMMARY
          echo "Check your updated stats at [README.md](../README.md)" >> $GITHUB_STEP_SUMMARY
